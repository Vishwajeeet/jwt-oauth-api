version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jwt-oauth-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-api_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-jwt_api_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d jwt_api_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jwt-oauth-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwt-oauth-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-api_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jwt_api_db}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - jwt-oauth-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  jwt-oauth-network:
    driver: bridge