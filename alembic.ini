[alembic]
# Path to migration scripts
script_location = alembic

# Database URL - will be overridden by env.py using settings.DATABASE_URL
sqlalchemy.url = postgresql://api_user:supersecretpassword@localhost:5432/jwt_api_db

# Set to 'true' to run migrations in transaction mode (PostgreSQL supports this)
transaction_per_migration = true

# Output encoding
output_encoding = utf-8

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S